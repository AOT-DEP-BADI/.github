name: Global Labels Synchronization

on:
  push:
    branches: [main]
    paths:
      - '.github/labels.yml'
  workflow_dispatch: # Allow manual launch

jobs:
  sync:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        repo:
          - AOT-DEP-BADI/grist-custom-widget-markdown-dsfr
          - AOT-DEP-BADI/grist-custom-widget-vite

    steps:
      - name: Checkout Configuration
        uses: actions/checkout@v7
      
      - name: Sync Labels to ${{ matrix.repo }}
        run: |
          echo "🔄 Fetching existing labels from ${{ matrix.repo }}..."
          # Cache all existing remote labels to avoid making repetitive API calls inside the loop
          EXISTING_LABELS=$(gh label list --repo ${{ matrix.repo }} --json name --jq '.[].name')

          # 1. Process labels defined in the local configuration file
          yq e '.[] | [.name, .color, .description] | @tsv' .github/labels.yml | while IFS=$'\t' read -r raw_name color description; do
            
            # Trim leading and trailing whitespaces from the label name to prevent API 404 errors
            name=$(echo "$raw_name" | xargs)
            
            # Check if the label already exists to determine the correct log status
            if echo "$EXISTING_LABELS" | grep -Fxq "$name"; then
              echo "🔄 [UPDATE] Global label '$name'"
            else
              echo "🚀 [CREATE] Global label '$name'"
            fi

            # Apply changes using an 'upsert' logic via --force (updates properties without detaching from issues)
            gh label create "$name" \
              --repo ${{ matrix.repo }} \
              --color "$color" \
              --description "$description" \
              --force
          done
          
          # 2. Clean up obsolete labels that are no longer declared in labels.yml
          echo "🧹 Cleaning up obsolete labels..."
          gh label list --repo ${{ matrix.repo }} --json name --jq '.[].name' | while read -r target_label; do
            
            # Check if the remote label exists in our local source of truth
            MATCH=$(yq e ".[] | select(.name == \"$target_label\") | .name" .github/labels.yml)
            if [ -z "$MATCH" ]; then
              echo "🗑️ [DELETE] Removing obsolete label: $target_label"
              gh label delete "$target_label" --repo ${{ matrix.repo }} --yes
            fi
          done
        env:
          GH_TOKEN: ${{ secrets.SYNC_LABELS_TOKEN }}