name: Global Labels Synchronization

on:
  push:
    branches: [main]
    paths:
      - '.github/labels.yml'
  workflow_dispatch: # Allow manual launch

jobs:
  sync:
    runs-on: ubuntu-latest
    strategy:
      # Listing of repo's organization to iterate sync
      matrix:
        repo:
          - AOT-DEP-BADI/grist-custom-widget-markdown-dsfr
          - AOT-DEP-BADI/grist-custom-widget-vite

    steps:
      - name: Checkout Configuration
        uses: actions/checkout@v7

      - name: Sync Labels to ${{ matrix.repo }}
        run: |
          echo "🔄 Syncing labels for ${{ matrix.repo }}..."
          yq e '.[] | [.name, .color, .description] | @tsv' .github/labels.yml | while IFS=$'\t' read -r name color description; do
            if gh label view "$name" --repo ${{ matrix.repo }} > /dev/null 2>&1; then
              echo "🎨 Updating existing label: $name"
              gh label edit "$name" --repo ${{ matrix.repo }} --color "$color" --description "$description"
            else
              echo "🚀 Creating new label: $name"
              gh label create "$name" --repo ${{ matrix.repo }} --color "$color" --description "$description"
            fi
          done
          
          echo "🧹 Cleaning up obsolete labels..."
          gh label list --repo ${{ matrix.repo }} --json name --jq '.[].name' | while read -r target_label; do
            MATCH=$(yq e ".[] | select(.name == \"$target_label\") | .name" .github/labels.yml)
            if [ -z "$MATCH" ]; then
              echo "🗑️ Removing obsolete label from repo: $target_label"
              gh label delete "$target_label" --repo ${{ matrix.repo }} --yes
            fi
          done
        env:
          GH_TOKEN: ${{ secrets.SYNC_LABELS_TOKEN }}