# ==========================================
# MAIN ISSUE TYPES
# ==========================================
- name: "🐛 bug"
  color: "d73a4a"
  description: "Something isn't working as expected or a functional regression."

- name: "💡 idea"
  color: "f3af49"
  description: "New idea, evolution, or functional request."

- name: "♻️ refactor"
  color: "#6ed06d"
  description: "Code restructuring, performance tuning, or technical debt mitigation."

- name: "📝 documentation"
  color: "707ab0"
  description: "Improvements, fixes, or additions to documentation or guides."

# ==========================================
# PRIORITIZATION (MoSCoW)
# ==========================================
- name: "priority: 🚨🚨🚨 must-have "
  color: "FF9E88"
  description: "Critical item required for the upcoming stable or current release."

- name: "priority: 🚨🚨 should-have "
  color: "FFE082"
  description: "Important feature or fix that adds high value but isn't a hard blocker."

- name: "priority: 🚨 could-have"
  color: "A5D6A7"
  description: "Nice-to-have improvement or minor polish if time permits."

- name: "priority: wont-have"
  color: "E0E0E0"
  description: "This will not be worked on, either by design choice or obsolescence."

# ==========================================
# AGILE WORKFLOW STATUS
# ==========================================
- name: "status: 🎯 refined"
  color: "cfd3d7"
  description: "Ready for development. Requirements and acceptance criteria are clear."

- name: "status: ⚙️ in progress"
  color: "cfd3d7"
  description: "Active development or execution is currently underway."

- name: "status: 👀 in review"
  color: "cfd3d7"
  description: "Changes are being reviewed, or waiting for Pull Request approval."

- name: "status: ✅ done"
  color: "cfd3d7"
  description: "Item is fully completed, tested, and deployed."

- name: "status: 🛑 blocked"
  color: "cfd3d7"
  description: "Progress is impeded by an external dependency or technical blocker."

- name: "status: 🙋 help wanted"
  color: "cfd3d7"
  description: "Extra attention or community contribution is needed on this item."

- name: "status: 💤 stale"
  color: "cfd3d7"
  description: "Item is inactive, obsolete, or dropped from the current scope."

- name: "status: 👯 duplicate"
  color: "cfd3d7"
  description: "This issue or pull request already exists elsewhere."

- name: "status: 🚫 invalid"
  color: "cfd3d7"
  description: "This doesn't seem right, lacks required info, or is out of scope."

